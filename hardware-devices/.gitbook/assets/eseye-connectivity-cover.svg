<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
<title id="title">Eseye global IoT connectivity map</title>
<desc id="desc">A dark map-inspired network with connected devices, mobile networks, and cloud services.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#031826"/>
    <stop offset="0.52" stop-color="#08324a"/>
    <stop offset="1" stop-color="#081f3f"/>
  </linearGradient>
  <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="#37d7ff" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#37d7ff" stop-opacity="0"/>
  </radialGradient>
</defs>
<rect width="1600" height="640" fill="url(#bg)"/>
<path d="M80 460 C270 320 420 340 570 238 S850 126 1020 230 1290 358 1515 170" fill="none" stroke="#55d5f2" stroke-width="4" stroke-opacity="0.55"/>
<path d="M130 250 C310 150 480 210 650 318 S960 470 1150 350 1325 260 1490 318" fill="none" stroke="#a7f3d0" stroke-width="3" stroke-opacity="0.45"/>
